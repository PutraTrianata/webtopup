<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotFaceN Store - Gaming Top-up</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #8b1f1f;
            color: white;
        }
        
        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Impact', sans-serif;
            color: white;
            text-decoration: none;
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav ul li a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 5px;
            border-bottom: 2px solid transparent;
            transition: border-bottom 0.3s;
        }
        
        nav ul li a:hover, 
        nav ul li a.active {
            border-bottom: 2px solid white;
        }
        
        .header-icons {
            display: flex;
            align-items: center;
        }
        
        .header-icons a {
            color: white;
            margin-left: 20px;
            font-size: 1.5rem;
            text-decoration: none;
        }
        
        /* Hero Banner */
        .hero-banner {
            margin: 20px 50px;
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('image/Header.png');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            padding: 50px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .hero-text h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .hero-text p {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        
        .order-btn {
            display: inline-block;
            background-color: #8b1f1f;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .order-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        
        /* Game Categories */
        .game-categories {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 50px;
        }
        
        .game-card {
            background-color: rgba(0,0,0,0.2);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image/BGgames.png');
            background-size: cover;
            opacity: 0.2;
            z-index: -1;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        .game-logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-right: 15px;
            overflow: hidden;
        }
        
        .game-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        /* Footer */
        footer {
            margin: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        
        /* Icons */
        .icon-search::before {
            content: "🔍";
        }
        
        .icon-user::before {
            content: "👤";
        }
        
        .icon-cart::before {
            content: "🛒";
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">NotFaceN STORE</a>
        <nav>
            <ul>
                <li><a href="#" class="active">TopUp</a></li>
                <li><a href="#">Cek Transaksi</a></li>
                <li><a href="#">Berita</a></li>
            </ul>
        </nav>
        <div class="header-icons">
            <a href="#" class="icon-search"></a>
            <a href="#" class="icon-user"></a>
            <a href="#" class="icon-cart"></a>
        </div>
    </header>
    
    <div class="hero-banner">
        <div class="hero-text">
            <h1>TopUp dan Joki Game</h1>
            <p>Layanan Tercepat dan Termurah</p>
            <p>24 Jam</p>
        </div>
        <a href="#" class="order-btn">Order Here</a>
    </div>
    
    <div class="game-categories">
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imageML.png" alt="Mobile Legend">
            </div>
            <div class="game-title">Mobile Legend</div>
        </div>
        
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imageFF.png" alt="Free Fire">
            </div>
            <div class="game-title">Free Fire</div>
        </div>
        
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imageGenshin.png" alt="Genshin Impact">
            </div>
            <div class="game-title">Genshin Impact</div>
        </div>
        
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imagePUBG.png" alt="PUBG Mobile">
            </div>
            <div class="game-title">PUBG Mobile</div>
        </div>
        
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imageCOC.png" alt="Clash Of Clans">
            </div>
            <div class="game-title">Clash Of Clans</div>
        </div>
        
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imageLOL.png" alt="League of Legend">
            </div>
            <div class="game-title">League of Legend</div>
        </div>
        
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imageHOK.png" alt="Honor Of Kings">
            </div>
            <div class="game-title">Honor Of Kings</div>
        </div>
        
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imageVALO.png" alt="Valorant">
            </div>
            <div class="game-title">Valorant</div>
        </div>
        
        <div class="game-card">
            <div class="game-logo">
                <img src="image/imageCR.png" alt="Clash Royale">
            </div>
            <div class="game-title">Clash Royale</div>
        </div>
    </div>
    
    <footer>
        <div class="divider"></div>
    </footer>
</body>
</html>
