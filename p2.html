<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotFaceN Store - Mobile Legend</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #8b1f1f;
            color: white;
        }
        
        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Impact', sans-serif;
            color: white;
            text-decoration: none;
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav ul li a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 5px;
            border-bottom: 2px solid transparent;
            transition: border-bottom 0.3s;
        }
        
        nav ul li a:hover, 
        nav ul li a.active {
            border-bottom: 2px solid white;
        }
        
        .header-icons {
            display: flex;
            align-items: center;
        }
        
        .header-icons a {
            color: white;
            margin-left: 20px;
            font-size: 1.5rem;
            text-decoration: none;
        }
        
        /* Game Banner */
        .game-banner {
            margin: 20px 50px;
            height: 200px;
            background-color: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        
        .game-banner-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://via.placeholder.com/1400x200/152238/ff5a5a');
            background-size: cover;
            background-position: center;
            opacity: 0.7;
        }
        
        .game-logo-large {
            position: absolute;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .game-logo-large img {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        
        .game-logo-large .game-info {
            text-align: center;
            font-size: 0.9rem;
        }
        
        .game-banner h1 {
            position: absolute;
            left: 300px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            font-weight: bold;
        }
        
        /* Account Form */
        .account-form {
            margin: 20px 50px;
            background-color: rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
        }
        
        .form-header {
            background-color: #555;
            padding: 15px 20px;
            font-size: 1.2rem;
        }
        
        .form-content {
            padding: 20px;
            display: flex;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        
        .input-label {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .input-field {
            background-color: #999;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            color: #333;
        }
        
        /* Products Grid */
        .products-grid {
            margin: 40px 50px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .product-card {
            background-color: #000;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .product-header {
            background-color: #555;
            padding: 15px;
            font-size: 1.1rem;
        }
        
        .product-content {
            padding: 20px;
            min-height: 150px;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }
        
        .buy-button {
            background-color: #e63946;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .buy-button:hover {
            background-color: #ff4d5e;
        }
        
        /* Footer */
        footer {
            margin: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        
        /* Icons */
        .icon-search::before {
            content: "🔍";
        }
        
        .icon-user::before {
            content: "👤";
        }
        
        .icon-cart::before {
            content: "🛒";
        }
    </style>
</head>
<body>
    <header>
        <a href="homepage.html" class="logo">NotFaceN STORE</a>
        <nav>
            <ul>
                <li><a href="homepage.html">TopUp</a></li>
                <li><a href="#">Cek Transaksi</a></li>
                <li><a href="#">Berita</a></li>
            </ul>
        </nav>
        <div class="header-icons">
            <a href="#" class="icon-search"></a>
            <a href="#" class="icon-user"></a>
            <a href="#" class="icon-cart"></a>
        </div>
    </header>
    
    <div class="game-banner">
        <div class="game-banner-bg"></div>
        <div class="game-logo-large">
            <img src="https://via.placeholder.com/100/ffaa00/ffffff?text=ML" alt="Mobile Legend">
            <div class="game-info">
                <p>Proses Cepat</p>
                <p>Pembayaran Aman</p>
                <p>Layanan 24 Jam</p>
            </div>
        </div>
        <h1>Mobile Legend</h1>
    </div>
    
    <div class="account-form">
        <div class="form-header">
            Masukkan Data Akun
        </div>
        <div class="form-content">
            <div class="input-group" style="margin-right: 20px;">
                <div class="input-label">ID</div>
                <input type="text" class="input-field" placeholder="Masukkan ID">
            </div>
            <div class="input-group">
                <div class="input-label">SERVER</div>
                <input type="text" class="input-field" placeholder="Masukkan Server">
            </div>
        </div>
    </div>
    
    <div class="products-grid">
        <div class="product-card">
            <div class="product-header">
                Diamond Package 1
            </div>
            <div class="product-content">
                <button class="buy-button">BELI</button>
            </div>
        </div>
        
        <div class="product-card">
            <div class="product-header">
                Diamond Package 2
            </div>
            <div class="product-content">
                <button class="buy-button">BELI</button>
            </div>
        </div>
        
        <div class="product-card">
            <div class="product-header">
                Diamond Package 3
            </div>
            <div class="product-content">
                <button class="buy-button">BELI</button>
            </div>
        </div>
        
        <div class="product-card">
            <div class="product-header">
                Diamond Package 4
            </div>
            <div class="product-content">
                <button class="buy-button">BELI</button>
            </div>
        </div>
        
        <div class="product-card">
            <div class="product-header">
                Diamond Package 5
            </div>
            <div class="product-content">
                <button class="buy-button">BELI</button>
            </div>
        </div>
        
        <div class="product-card">
            <div class="product-header">
                Diamond Package 6
            </div>
            <div class="product-content">
                <button class="buy-button">BELI</button>
            </div>
        </div>
    </div>
    
    <footer>
        <div class="divider"></div>
    </footer>

    <script>
        // Basic form validation
        const idField = document.querySelector('.input-field[placeholder="Masukkan ID"]');
        const serverField = document.querySelector('.input-field[placeholder="Masukkan Server"]');
        const buyButtons = document.querySelectorAll('.buy-button');
        
        buyButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (!idField.value || !serverField.value) {
                    alert('Harap masukkan ID dan Server anda terlebih dahulu!');
                } else {
                    alert(`Pembelian berhasil untuk ID: ${idField.value} dan Server: ${serverField.value}`);
                }
            });
        });
    </script>
</body>
</html>
